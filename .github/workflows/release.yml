name: Release preparation (disabled by default)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    if: ${{ vars.BIDILENS_RELEASE_ENABLED == 'true' }}
    # Pixel snapshots are Windows/Arial baselines; the regular CI workflow
    # independently runs quality and package consumers on Ubuntu.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.27.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run changeset:status
      - run: pnpm run check
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm run test:visual
      - run: pnpm run packages:types
      - run: pnpm run deps:audit
      - run: pnpm run release:check
      - run: pnpm run sbom
      - run: pnpm run sbom:check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bidilens-release-preparation
          path: bidilens-sbom.cdx.json
          if-no-files-found: error

      # Publication is intentionally absent. Add trusted publishing only after
      # real repository metadata, npm scope ownership, provenance, a private
      # security channel, and a protected human-approved environment exist.
